<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a5c4a">
<title>ギネス家ポータル</title>
<link rel="icon" type="image/png" href="assets/icon_180.png">
<link rel="apple-touch-icon" href="assets/icon_180.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --brand: #1a5c4a;
  --brand-light: #e6f2ee;
  --bg: #f4f5f7;
  --card: #ffffff;
  --text: #1f2937;
  --text-sub: #6b7280;
  --line: #e5e7eb;
  --danger: #dc2626;
  --warn: #ea580c;
  --ok: #16a34a;
  --radius: 14px;
  --nav-h: 60px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: var(--bg); color: var(--text);
  /* iPhoneのステータスバー（時計・電池表示）やノッチと重ならないための安全余白 */
  padding-top: max(env(safe-area-inset-top), 0px);
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
}
button { font-family: inherit; font-size: 1rem; border: none; background: none; cursor: pointer; color: inherit; }
input, select { font-family: inherit; font-size: 1rem; }

/* ---------- 共通レイアウト ---------- */
.view { display: none; max-width: 560px; margin: 0 auto; padding: 12px 14px 24px; }
.view.active { display: block; }
.view-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 2px 14px;
}
.view-header h1 { font-size: 1.25rem; font-weight: 700; }
.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 14px; margin-bottom: 12px;
}
.empty { text-align: center; color: var(--text-sub); padding: 24px 0; font-size: .9rem; }
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 6px;
  background: var(--danger); color: #fff; border-radius: 10px;
  font-size: .72rem; font-weight: 700;
}
.chip {
  display: inline-block; padding: 2px 8px; border-radius: 999px;
  font-size: .72rem; font-weight: 600;
}
.btn-primary {
  background: var(--brand); color: #fff; border-radius: 10px;
  padding: 12px 18px; font-weight: 700; width: 100%;
}
.btn-primary:disabled { opacity: .4; }
.btn-ghost { color: var(--brand); font-weight: 600; padding: 8px 10px; }
.btn-danger-ghost { color: var(--danger); font-weight: 600; padding: 8px 10px; }

/* ---------- ログイン ---------- */
#view-login { display: none; min-height: 100vh; padding-top: 18vh; text-align: center; }
#view-login.active { display: block; }
.login-logo { font-size: 3rem; }
.login-title { font-size: 1.4rem; font-weight: 800; color: var(--brand); margin: 8px 0 28px; }
#login-pass {
  width: 100%; max-width: 300px; padding: 13px 16px; border: 1.5px solid var(--line);
  border-radius: 12px; text-align: center; letter-spacing: .1em; background: var(--card);
}
#login-pass:focus { outline: none; border-color: var(--brand); }
#login-btn { max-width: 300px; margin-top: 14px; }
#login-err { color: var(--danger); font-size: .85rem; margin-top: 12px; min-height: 1.2em; }

/* ---------- ホーム ---------- */
.home-head { padding: 18px 2px 4px; }
.home-date { color: var(--text-sub); font-size: .85rem; }
.home-title { font-size: 1.45rem; font-weight: 800; color: var(--brand); }
.home-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.home-guinness { width: 62px; height: 62px; border-radius: 16px; flex-shrink: 0; }
/* メンバー選択チップ・食事不要チェック */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.sel-chip {
  padding: 8px 14px; border-radius: 999px; border: 1.5px solid var(--line);
  background: var(--card); font-size: .88rem; font-weight: 600; color: var(--text-sub);
}
.sel-chip.on { color: #fff; border-color: transparent; }
.btn-close { color: var(--text-sub); font-weight: 600; padding: 12px 10px; width: 100%; }
.meal-note { color: var(--warn); font-size: .72rem; font-weight: 600; }
.mem-names { font-size: .72rem; color: var(--text-sub); }
.section-label { font-size: .8rem; font-weight: 700; color: var(--text-sub); margin: 14px 2px 8px; }
.today-event { display: flex; align-items: center; gap: 10px; padding: 9px 2px; }
.today-event + .today-event { border-top: 1px solid var(--line); }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.today-event .t-time { font-size: .78rem; color: var(--text-sub); width: 52px; flex-shrink: 0; line-height: 1.25; }
.tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.tile {
  position: relative; background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 18px 14px; text-align: center;
}
.tile .icon { font-size: 2rem; }
.tile .label { display: block; margin-top: 6px; font-weight: 700; font-size: .92rem; }
.tile .badge { position: absolute; top: 10px; right: 10px; }

/* ---------- 下部ナビ ---------- */
#bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  display: none; grid-template-columns: repeat(4, 1fr);
  height: calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--card); border-top: 1px solid var(--line);
}
#bottom-nav.show { display: grid; }
.nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--text-sub); position: relative; }
.nav-btn .n-icon { font-size: 1.3rem; }
.nav-btn .n-label { font-size: .62rem; font-weight: 600; }
.nav-btn.active { color: var(--brand); }
.nav-btn .badge { position: absolute; top: 4px; right: calc(50% - 24px); }

/* ---------- 入力列 ---------- */
.add-row { display: flex; gap: 8px; margin-bottom: 12px; }
.add-row input[type="text"] {
  flex: 1; min-width: 0; padding: 12px 14px; border: 1.5px solid var(--line);
  border-radius: 12px; background: var(--card);
}
.add-row input:focus { outline: none; border-color: var(--brand); }
.add-row .add-btn {
  background: var(--brand); color: #fff; border-radius: 12px;
  width: 48px; flex-shrink: 0; font-size: 1.4rem; font-weight: 700;
}

/* ---------- 買い物リスト ---------- */
.shop-item { display: flex; align-items: center; gap: 10px; padding: 11px 2px; }
.shop-item + .shop-item { border-top: 1px solid var(--line); }
.shop-check {
  width: 26px; height: 26px; border: 2px solid #cbd5e1; border-radius: 8px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; color: #fff; background: var(--card);
}
.shop-item.done .shop-check { background: var(--ok); border-color: var(--ok); }
.shop-item .name { flex: 1; word-break: break-all; }
.shop-item.done .name { color: var(--text-sub); text-decoration: line-through; }
.badge-stock { background: #fef3c7; color: #92400e; }
.del-btn { color: #cbd5e1; font-size: 1.1rem; padding: 6px 8px; flex-shrink: 0; }

/* ---------- 食材在庫 ---------- */
.seg { display: flex; background: #e9eaee; border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.seg button { flex: 1; padding: 8px 0; border-radius: 8px; font-size: .85rem; font-weight: 600; color: var(--text-sub); }
.seg button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
.pantry-item { display: flex; align-items: center; gap: 10px; padding: 11px 2px; }
.pantry-item + .pantry-item { border-top: 1px solid var(--line); }
.pantry-item .name { flex: 1; word-break: break-all; }
.pantry-item .exp { font-size: .78rem; }
.out-btn {
  background: #fee2e2; color: var(--danger); border-radius: 10px;
  padding: 7px 10px; font-size: .8rem; font-weight: 700; flex-shrink: 0;
}
.exp-red { color: var(--danger); font-weight: 700; }
.exp-orange { color: var(--warn); font-weight: 700; }
.exp-gray { color: var(--text-sub); }
.pantry-form-grid { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
.pantry-form-grid input[type="date"] {
  padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 12px; background: var(--card);
}

/* ---------- サブスク ---------- */
.subs-total { text-align: center; padding: 20px 14px; }
.subs-total .label { font-size: .8rem; color: var(--text-sub); font-weight: 600; }
.subs-total .amount { font-size: 2.3rem; font-weight: 800; color: var(--brand); }
.subs-total .amount small { font-size: 1rem; }
.sub-item { display: flex; align-items: center; gap: 10px; padding: 12px 2px; }
.sub-item + .sub-item { border-top: 1px solid var(--line); }
.sub-item .info { flex: 1; min-width: 0; }
.sub-item .name { font-weight: 600; word-break: break-all; }
.sub-item .meta { font-size: .75rem; color: var(--text-sub); }
.sub-item .price { font-weight: 700; white-space: nowrap; }
.badge-renew { background: #fee2e2; color: var(--danger); }
.form-grid { display: grid; gap: 8px; }
.form-grid input[type="text"], .form-grid input[type="number"], .form-grid input[type="date"],
.form-grid input[type="time"], .form-grid select {
  width: 100%; min-width: 0; padding: 11px 12px; border: 1.5px solid var(--line);
  border-radius: 12px; background: var(--card);
  -webkit-appearance: none; appearance: none;
}
.form-2col > div { min-width: 0; }
/* iOSのdate/time入力は中身が空だと幅が潰れるため高さと表示を揃える */
.form-grid input[type="date"], .form-grid input[type="time"] {
  min-height: 46px; display: flex; align-items: center;
}
.form-grid input:focus, .form-grid select:focus { outline: none; border-color: var(--brand); }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.f-label { display: block; font-size: .72rem; color: var(--text-sub); font-weight: 600; margin: 2px 2px 4px; }

/* ---------- 車予約 ---------- */
.week-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
.week-nav .wk-label { font-weight: 700; font-size: .95rem; min-width: 170px; text-align: center; }
.week-nav button { padding: 6px 14px; font-size: 1.1rem; color: var(--brand); font-weight: 700; }
.timeline-wrap { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.tl-header { display: grid; grid-template-columns: 34px repeat(7, 1fr); border-bottom: 1px solid var(--line); }
.tl-header .day-h { text-align: center; padding: 7px 0; font-size: .7rem; color: var(--text-sub); }
.tl-header .day-h .d-num { display: block; font-size: .85rem; font-weight: 700; color: var(--text); }
.tl-header .day-h.today-h { background: var(--brand-light); }
.tl-header .day-h.today-h .d-num { color: var(--brand); }
.tl-body { display: grid; grid-template-columns: 34px repeat(7, 1fr); }
.tl-hours { position: relative; }
.tl-hours .h-label {
  position: absolute; right: 4px; transform: translateY(-50%);
  font-size: .62rem; color: var(--text-sub);
}
.tl-day { position: relative; border-left: 1px solid var(--line); }
.tl-day .h-line { position: absolute; left: 0; right: 0; border-top: 1px solid #f1f2f4; }
.tl-block {
  position: absolute; left: 1px; right: 1px; border-radius: 6px;
  color: #fff; font-size: .6rem; font-weight: 700; overflow: hidden;
  padding: 2px 3px; line-height: 1.2;
}
.legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 8px 4px 12px; }
.legend .lg { display: flex; align-items: center; gap: 5px; font-size: .75rem; color: var(--text-sub); }

/* ---------- カレンダー ---------- */
.cal-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
.cal-nav .cal-label { font-weight: 700; font-size: 1.05rem; min-width: 130px; text-align: center; }
.cal-nav button { padding: 6px 14px; font-size: 1.1rem; color: var(--brand); font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; padding: 6px 4px 8px; }
.cal-wd { text-align: center; font-size: .7rem; color: var(--text-sub); padding: 6px 0; font-weight: 600; }
.cal-cell { min-height: 52px; text-align: center; padding: 4px 0 2px; border-radius: 10px; }
.cal-cell .d { font-size: .85rem; display: inline-flex; width: 24px; height: 24px; align-items: center; justify-content: center; border-radius: 50%; }
.cal-cell.today .d { background: var(--brand); color: #fff; font-weight: 700; }
.cal-cell.selected { background: var(--brand-light); }
.cal-cell.dim .d { color: #c3c8d0; }
.cal-dots { display: flex; justify-content: center; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
.cal-dots .dot { width: 6px; height: 6px; }
.day-event { display: flex; align-items: center; gap: 10px; padding: 11px 2px; }
.day-event + .day-event { border-top: 1px solid var(--line); }
.day-event .t-time { font-size: .78rem; color: var(--text-sub); width: 52px; flex-shrink: 0; line-height: 1.25; }
.day-event .title { flex: 1; word-break: break-all; }
.sun { color: var(--danger); } .sat { color: #2563eb; }

/* ---------- モーダル ---------- */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal-box {
  background: var(--card); width: 100%; max-width: 560px;
  border-radius: 18px 18px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
  max-height: 85vh; overflow-y: auto;
}
#modal-box h2 { font-size: 1.05rem; margin-bottom: 14px; }

/* ---------- トースト ---------- */
#toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);
  background: #111827; color: #fff; border-radius: 12px; padding: 12px 16px;
  font-size: .88rem; z-index: 200; display: none; align-items: center; gap: 12px;
  max-width: 92vw; box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
#toast.show { display: flex; }
#toast button { color: #6ee7b7; font-weight: 700; white-space: nowrap; }
#toast .t-no { color: #9ca3af; }

/* ---------- エラーバナー ---------- */
#err-banner {
  display: none; background: #fee2e2; color: #991b1b; font-size: .82rem;
  padding: 10px 14px; text-align: center;
}
#err-banner.show { display: block; }
</style>
</head>
<body>

<div id="err-banner"></div>

<!-- ログイン -->
<div id="view-login" class="view">
  <div class="login-logo"><img src="assets/guinness_home.png" alt="ギネス" style="width:96px;height:96px;border-radius:24px"></div>
  <div class="login-title">ギネス家ポータル</div>
  <input id="login-pass" type="password" placeholder="家族の合言葉" autocomplete="current-password">
  <button id="login-btn" class="btn-primary">入る</button>
  <div id="login-err"></div>
</div>

<!-- ホーム -->
<div id="view-home" class="view">
  <div class="home-head">
    <div class="home-date" id="home-date"></div>
    <div class="home-title-row">
      <div class="home-title">ギネス家ポータル</div>
      <img src="assets/guinness_home.png" alt="ギネス" class="home-guinness">
    </div>
  </div>
  <div class="section-label">今日の予定</div>
  <div class="card" id="home-today"></div>
  <div class="section-label">アプリ</div>
  <div class="tiles">
    <button class="tile" data-goto="shopping"><span class="icon">🛒</span><span class="label">買い物リスト</span><span class="badge" id="bdg-shop" hidden></span></button>
    <button class="tile" data-goto="pantry"><span class="icon">🥚</span><span class="label">食材在庫</span><span class="badge" id="bdg-pantry" hidden></span></button>
    <button class="tile" data-goto="subs"><span class="icon">💳</span><span class="label">サブスク</span><span class="badge" id="bdg-subs" hidden></span></button>
    <button class="tile" data-goto="car"><span class="icon">🚗</span><span class="label">車予約</span></button>
    <button class="tile" data-goto="calendar"><span class="icon">📅</span><span class="label">カレンダー</span></button>
    <button class="tile" id="logout-tile"><span class="icon">🔒</span><span class="label">ロックする</span></button>
  </div>
  <div style="text-align:center;color:var(--text-sub);font-size:.7rem;margin-top:18px">v0.3.0</div>
</div>

<!-- 買い物リスト -->
<div id="view-shopping" class="view">
  <div class="view-header"><h1>🛒 買い物リスト</h1><button class="btn-ghost" id="shop-clear-done">チェック済みを削除</button></div>
  <div class="add-row">
    <input type="text" id="shop-input" placeholder="例：牛乳" enterkeyhint="done">
    <button class="add-btn" id="shop-add">＋</button>
  </div>
  <div class="card" id="shop-list"></div>
</div>

<!-- 食材在庫 -->
<div id="view-pantry" class="view">
  <div class="view-header"><h1>🥚 食材在庫</h1></div>
  <div class="card">
    <div class="form-grid">
      <input type="text" id="pantry-name" placeholder="品名（例：たまご）" enterkeyhint="done">
      <div class="form-2col">
        <input type="date" id="pantry-date">
        <select id="pantry-cat"><option>冷蔵</option><option>冷凍</option><option>常温</option></select>
      </div>
      <select id="pantry-itemcat"></select>
      <button class="btn-primary" id="pantry-add">在庫に追加</button>
    </div>
  </div>
  <div class="form-2col" style="margin-bottom:10px">
    <select id="pantry-filter-itemcat" style="padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:var(--card)"></select>
    <select id="pantry-sort" style="padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:var(--card)">
      <option value="expiry">賞味期限の近い順</option>
      <option value="freq">よく使う順</option>
      <option value="newest">追加が新しい順</option>
      <option value="name">名前順</option>
    </select>
  </div>
  <div class="seg" id="pantry-seg">
    <button data-cat="all" class="active">すべて</button>
    <button data-cat="冷蔵">冷蔵</button>
    <button data-cat="冷凍">冷凍</button>
    <button data-cat="常温">常温</button>
  </div>
  <div class="card" id="pantry-list"></div>
</div>

<!-- サブスク -->
<div id="view-subs" class="view">
  <div class="view-header"><h1>💳 サブスク</h1></div>
  <div class="card subs-total">
    <div class="label">月額合計（年払いは12分割で換算）</div>
    <div class="amount" id="subs-total">¥0<small>/月</small></div>
  </div>
  <div class="card">
    <div class="form-grid">
      <input type="text" id="sub-name" placeholder="サービス名（例：Netflix）">
      <div class="form-2col">
        <input type="number" id="sub-amount" placeholder="金額（円）" inputmode="numeric" min="0">
        <select id="sub-cycle"><option value="monthly">月額</option><option value="yearly">年額</option></select>
      </div>
      <select id="sub-month">
        <option value="">更新月（任意）</option>
      </select>
      <button class="btn-primary" id="sub-add">登録する</button>
    </div>
  </div>
  <div class="card" id="subs-list"></div>
</div>

<!-- 車予約 -->
<div id="view-car" class="view">
  <div class="view-header"><h1>🚗 車予約</h1><button class="btn-ghost" id="car-add-btn">＋ 予約</button></div>
  <div class="week-nav">
    <button id="car-prev">＜</button>
    <span class="wk-label" id="car-week-label"></span>
    <button id="car-next">＞</button>
    <button id="car-today" style="font-size:.8rem">今週</button>
  </div>
  <div class="legend" id="car-legend"></div>
  <div class="timeline-wrap">
    <div class="tl-header" id="tl-header"></div>
    <div class="tl-body" id="tl-body"></div>
  </div>
  <p style="font-size:.75rem;color:var(--text-sub);margin-top:8px;text-align:center">空いている時間帯をタップで予約 / 予約ブロックをタップで詳細</p>
</div>

<!-- カレンダー -->
<div id="view-calendar" class="view">
  <div class="view-header"><h1>📅 カレンダー</h1><button class="btn-ghost" id="cal-add-btn">＋ 予定</button></div>
  <div class="cal-nav">
    <button id="cal-prev">＜</button>
    <span class="cal-label" id="cal-label"></span>
    <button id="cal-next">＞</button>
    <button id="cal-today" style="font-size:.8rem">今日</button>
  </div>
  <div class="legend" id="cal-legend"></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="section-label" id="cal-sel-label"></div>
  <div class="card" id="cal-day-list"></div>
</div>

<!-- 下部ナビ -->
<nav id="bottom-nav">

<script>

const CONFIG = {

  // 合言葉のSHA-256ハッシュ（初期値の合言葉: guinness）
  // 変更方法: README.md 参照
  PASS_HASH: '8879addeb18c6b29e8b89960f3310224792fbe08e955aabc3956bd4f29f1bc72',

/* ============================================================
 * 同期設計メモ（tangocho supaLoad バグの教訓）
 * ・クラウド(Supabase)を唯一の正とする。ローカルにデータを保存しない
 *   → 「空のクラウドをローカルが上書き」する経路が存在しない
 * ・操作は即クラウドへ書き込み → Realtime通知で全端末が再取得
 * ============================================================ */

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const yen = (n) => '¥' + Math.round(n).toLocaleString('ja-JP');
const WDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const dstr = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
const todayStr = () => dstr(new Date());
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const MINNA = { name: 'みんな', color: '#8b5cf6' };  // 家族全員の予定用（紫）
const memberColor = (name) => name === MINNA.name ? MINNA.color
  : (CONFIG.MEMBERS.find((m) => m.name === name) || {}).color || '#9ca3af';
const ITEM_CATS = ['野菜', '調味料', '主食', '飲料', '肉魚類', '果物', '缶詰', 'お菓子', '生活消耗品', 'その他'];
const MEALS = ['朝', '昼', '夜'];

let sb = null;
const state = {
  shopping: [], pantry: [], subs: [], cars: [], events: [],
  currentView: 'home',
  pantryCat: 'all',
  pantryItemCat: 'all',
  pantrySort: 'expiry',
  carWeekStart: mondayOf(new Date()),
  calCursor: new Date(),
  calSelected: todayStr(),
};

function mondayOf(d) {
  const x = new Date(d); x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  return x;
}

/* ---------- 予定（期間対応）ヘルパー ---------- */
const evEndDate = (e) => e.end_date || e.event_date;           // 終了日（未設定なら当日）
const eventCovers = (e, ds) => e.event_date <= ds && ds <= evEndDate(e); // その日が期間内か
const fmtMD = (s) => `${Number(s.slice(5, 7))}/${Number(s.slice(8, 10))}`;
function evTimeLabel(e, ds) {
  const st = e.start_time ? e.start_time.slice(0, 5) : '';
  const et = e.end_time ? e.end_time.slice(0, 5) : '';
  if (evEndDate(e) === e.event_date) {           // 単日の予定
    if (st && et) return `${st}<br>〜${et}`;
    if (st) return st;
    if (et) return `〜${et}`;
    return '終日';
  }
  if (ds === e.event_date) return st ? `${st}〜` : '開始日';    // 期間の初日
  if (ds === evEndDate(e)) return et ? `〜${et}` : '最終日';    // 期間の最終日
  return '期間中';
}
const evPeriodNote = (e) => evEndDate(e) !== e.event_date
  ? `<small style="color:var(--text-sub)">📆 ${fmtMD(e.event_date)}〜${fmtMD(evEndDate(e))}</small>` : '';
/* 参加メンバー（旧データは member 1人 → 配列に読み替え） */
const evMembers = (e) => (e.members && e.members.length) ? e.members : (e.member ? [e.member] : []);
const memberDots = (names) => names.map((n) => `<span class="dot" style="background:${memberColor(n)}"></span>`).join('');
const mealNote = (e) => (e.skip_meals && e.skip_meals.length)
  ? `<span class="meal-note">🍽️食事不要: ${e.skip_meals.map(esc).join('・')}</span>` : '';

/* ---------- トースト ---------- */
let toastTimer = null;
function toast(msg, ms = 2500) {
  const t = $('#toast');
  t.innerHTML = esc(msg);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}
function actionToast(msg, yesLabel, onYes, ms = 8000) {
  const t = $('#toast');
  t.innerHTML = `<span>${esc(msg)}</span>`;
  const yes = document.createElement('button'); yes.textContent = yesLabel;
  const no = document.createElement('button'); no.textContent = 'いいえ'; no.className = 't-no';
  yes.onclick = () => { t.classList.remove('show'); onYes(); };
  no.onclick = () => t.classList.remove('show');
  t.append(yes, no);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ---------- モーダル ---------- */
function openModal(html) {
  $('#modal-box').innerHTML = html;
  $('#modal-overlay').classList.add('show');
}
function closeModal() { $('#modal-overlay').classList.remove('show'); }
$('#modal-overlay').addEventListener('click', (e) => { if (e.target.id === 'modal-overlay') closeModal(); });

/* ---------- エラー表示 ---------- */
function showErr(msg) {
  const b = $('#err-banner');
  b.textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 6000);
}
function dbErr(e, fallback) {
  console.error(e);
  showErr(fallback + (e && e.message ? `（${e.message}）` : ''));
}

/* ============================================================
 * 認証（家族共通の合言葉）
 * ============================================================ */
async function sha256hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, '0')).join('');
}
async function tryLogin() {
  const pass = $('#login-pass').value.trim();
  if (!pass) return;
  const h = await sha256hex(pass);
  if (h === CONFIG.PASS_HASH) {
    localStorage.setItem('gp_auth', h);
    startApp();
  } else {
    $('#login-err').textContent = '合言葉がちがいます';
    $('#login-pass').value = '';
  }
}
$('#login-btn').addEventListener('click', tryLogin);
$('#login-pass').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
$('#logout-tile').addEventListener('click', () => {
  localStorage.removeItem('gp_auth');
  location.reload();
});

/* ============================================================
 * 画面切り替え
 * ============================================================ */
function showView(name) {
  state.currentView = name;
  $$('.view').forEach((v) => v.classList.remove('active'));
  $(`#view-${name}`).classList.add('active');
  $$('#bottom-nav .nav-btn').forEach((b) => b.classList.toggle('active', b.dataset.goto === name));
  window.scrollTo(0, 0);
  render(name);
}
document.addEventListener('click', (e) => {
  const g = e.target.closest('[data-goto]');
  if (g) showView(g.dataset.goto);
});

function render(name) {
  ({ home: renderHome, shopping: renderShopping, pantry: renderPantry,
     subs: renderSubs, car: renderCar, calendar: renderCalendar }[name] || (() => {}))();
}
function rerender() { render(state.currentView); renderBadges(); }

/* ============================================================
 * データ読み込み（クラウドが唯一の正）
 * ============================================================ */
async function loadTable(table) {
  const orders = {
    shopping_items: ['created_at', { ascending: true }],
    pantry_items: ['expires_on', { ascending: true }],
    subscriptions: ['created_at', { ascending: true }],
    car_reservations: ['starts_at', { ascending: true }],
    events: ['start_time', { ascending: true, nullsFirst: true }],
  };
  const [col, opt] = orders[table];
  const { data, error } = await sb.from(table).select('*').order(col, opt);
  if (error) throw error;
  const key = { shopping_items: 'shopping', pantry_items: 'pantry', subscriptions: 'subs', car_reservations: 'cars', events: 'events' }[table];
  state[key] = data || [];
}
async function loadAll() {
  await Promise.all(['shopping_items', 'pantry_items', 'subscriptions', 'car_reservations', 'events'].map(loadTable));
}

/* Realtime: どこかの端末で変更 → 該当テーブルを再取得して再描画 */
function subscribeRealtime() {
  const ch = sb.channel('portal-sync');
  ['shopping_items', 'pantry_items', 'subscriptions', 'car_reservations', 'events'].forEach((t) => {
    ch.on('postgres_changes', { event: '*', schema: 'public', table: t }, async () => {
      try { await loadTable(t); rerender(); } catch (e) { console.error(e); }
    });
  });
  ch.subscribe();
}

/* ============================================================
 * ホーム
 * ============================================================ */
function renderHome() {
  const now = new Date();
  $('#home-date').textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日（${WDAYS[now.getDay()]}）`;
  const todays = state.events.filter((e) => eventCovers(e, todayStr())).slice(0, 3);
  $('#home-today').innerHTML = todays.length
    ? todays.map((e) => `
      <div class="today-event">
        <span style="display:flex;gap:2px;flex-shrink:0">${memberDots(evMembers(e))}</span>
        <span class="t-time">${evTimeLabel(e, todayStr())}</span>
        <span>${esc(e.title)} <span class="mem-names">${evMembers(e).map(esc).join('・')}</span> ${evPeriodNote(e)} ${mealNote(e)}</span>
      </div>`).join('')
    : '<div class="empty">今日の予定はありません</div>';
  renderBadges();
}

function renderBadges() {
  const shopCount = state.shopping.filter((i) => !i.checked).length;
  const pantryCount = state.pantry.filter((i) => daysLeft(i.expires_on) <= 3).length;
  const m = new Date().getMonth() + 1;
  const subsCount = state.subs.filter((s) => s.cycle === 'yearly' && s.renewal_month === m).length;
  setBadge('#bdg-shop', shopCount); setBadge('#nav-bdg-shop', shopCount);
  setBadge('#bdg-pantry', pantryCount); setBadge('#nav-bdg-pantry', pantryCount);
  setBadge('#bdg-subs', subsCount);
}
function setBadge(sel, n) {
  const el = $(sel);
  if (!el) return;
  el.hidden = n <= 0;
  el.textContent = n;
}

/* ============================================================
 * 買い物リスト（優先度1）
 * ============================================================ */
function renderShopping() {
  const items = [...state.shopping].sort((a, b) => Number(a.checked) - Number(b.checked));
  $('#shop-list').innerHTML = items.length
    ? items.map((i) => `
      <div class="shop-item ${i.checked ? 'done' : ''}" data-id="${i.id}">
        <button class="shop-check" data-act="toggle">${i.checked ? '✓' : ''}</button>
        <span class="name" data-act="edit">${esc(i.name)}</span>
        ${i.source === 'pantry' ? '<span class="chip badge-stock">在庫切れ</span>' : ''}
        <button class="del-btn" data-act="del">✕</button>
      </div>`).join('')
    : '<div class="empty">リストは空です 🎉</div>';
}

async function addShopping(name, source = 'manual', pantryCategory = null) {
  const { error } = await sb.from('shopping_items').insert({ name, source, pantry_category: pantryCategory });
  if (error) return dbErr(error, '追加に失敗しました');
  await loadTable('shopping_items'); rerender();
}

$('#shop-add').addEventListener('click', () => {
  const input = $('#shop-input');
  const name = input.value.trim();
  if (!name) return;
  input.value = '';
  addShopping(name);
});
$('#shop-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#shop-add').click(); });

$('#shop-list').addEventListener('click', async (e) => {
  const row = e.target.closest('.shop-item');
  const act = e.target.closest('[data-act]');
  if (!row || !act) return;
  const item = state.shopping.find((i) => i.id === row.dataset.id);
  if (!item) return;

  if (act.dataset.act === 'del') {
    const { error } = await sb.from('shopping_items').delete().eq('id', item.id);
    if (error) return dbErr(error, '削除に失敗しました');
  } else if (act.dataset.act === 'edit') {
    return openShoppingEditModal(item);
  } else if (act.dataset.act === 'toggle') {
    const checked = !item.checked;
    const { error } = await sb.from('shopping_items')
      .update({ checked, checked_at: checked ? new Date().toISOString() : null })
      .eq('id', item.id);
    if (error) return dbErr(error, '更新に失敗しました');
    // 購入チェック時 →「在庫に反映しますか？」（在庫との循環連携）
    if (checked) {
      actionToast(`「${item.name}」を在庫に反映しますか？`, '反映する', () => openPantryReflectModal(item));
    }
  }
  await loadTable('shopping_items'); rerender();
});

$('#shop-clear-done').addEventListener('click', async () => {
  const done = state.shopping.filter((i) => i.checked);
  if (!done.length) return toast('チェック済みの品目はありません');
  const { error } = await sb.from('shopping_items').delete().eq('checked', true);
  if (error) return dbErr(error, '削除に失敗しました');
  await loadTable('shopping_items'); rerender();
  toast(`${done.length}件を削除しました`);
});

/* 買い物品目の編集モーダル */
function openShoppingEditModal(item) {
  openModal(`
    <h2>🛒 品目を編集</h2>
    <div class="form-grid">
      <input type="text" id="se-name" value="${esc(item.name)}">
      <button class="btn-primary" id="se-ok">保存する</button>
      <button class="btn-danger-ghost" id="se-del">削除する</button>
      <button class="btn-close" id="se-close">閉じる</button>
    </div>`);
  $('#se-close').addEventListener('click', closeModal);
  $('#se-ok').addEventListener('click', async () => {
    const name = $('#se-name').value.trim();
    if (!name) return toast('品名を入れてください');
    const { error } = await sb.from('shopping_items').update({ name }).eq('id', item.id);
    closeModal();
    if (error) return dbErr(error, '保存に失敗しました');
    await loadTable('shopping_items'); rerender();
  });
  $('#se-del').addEventListener('click', async () => {
    if (!confirm(`「${item.name}」を削除しますか？`)) return;
    const { error } = await sb.from('shopping_items').delete().eq('id', item.id);
    closeModal();
    if (error) return dbErr(error, '削除に失敗しました');
    await loadTable('shopping_items'); rerender();
  });
}

/* 購入品を在庫に反映するモーダル（賞味期限を入れるだけ） */
function openPantryReflectModal(item) {
  const def = dstr(addDays(new Date(), 7));
  openModal(`
    <h2>「${esc(item.name)}」を在庫に追加</h2>
    <div class="form-grid">
      <span class="f-label">賞味期限</span>
      <input type="date" id="rf-date" value="${def}">
      <div class="form-2col">
        <select id="rf-cat">
          ${['冷蔵', '冷凍', '常温'].map((c) => `<option ${c === (item.pantry_category || '冷蔵') ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
        <select id="rf-itemcat">
          ${ITEM_CATS.map((c) => `<option ${c === (item.pantry_item_category || 'その他') ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <button class="btn-primary" id="rf-ok">在庫に追加する</button>
      <button class="btn-close" id="rf-close">閉じる</button>
    </div>`);
  $('#rf-close').addEventListener('click', closeModal);
  $('#rf-ok').addEventListener('click', async () => {
    const { error } = await sb.from('pantry_items').insert({
      name: item.name, category: $('#rf-cat').value, item_category: $('#rf-itemcat').value,
      expires_on: $('#rf-date').value, note: item.pantry_note || null,
      use_count: (item.pantry_use_count || 0) + 1,   // 循環するたびに「よく使う」度が上がる
    });
    closeModal();
    if (error) return dbErr(error, '在庫への追加に失敗しました');
    await loadTable('pantry_items'); rerender();
    toast(`「${item.name}」を在庫に追加しました 🥚`);
  });
}

/* ============================================================
 * 食材在庫（優先度2）
 * ============================================================ */
function daysLeft(expiresOn) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiresOn + 'T00:00:00');
  return Math.round((exp - today) / 86400000);
}
function expChip(expiresOn) {
  const n = daysLeft(expiresOn);
  const ymd = `${expiresOn.slice(0, 4)}/${Number(expiresOn.slice(5, 7))}/${Number(expiresOn.slice(8, 10))}`;
  if (n < 0) return `<span class="exp exp-red">期限切れ（${ymd}）</span>`;
  if (n === 0) return `<span class="exp exp-red">今日まで（${ymd}）</span>`;
  if (n <= 3) return `<span class="exp exp-orange">あと${n}日（${ymd}）</span>`;
  return `<span class="exp exp-gray">${ymd}まで</span>`;
}

const PANTRY_SORTS = {
  expiry: (a, b) => a.expires_on.localeCompare(b.expires_on),
  freq: (a, b) => (b.use_count || 1) - (a.use_count || 1),
  newest: (a, b) => b.created_at.localeCompare(a.created_at),
  name: (a, b) => a.name.localeCompare(b.name, 'ja'),
};

function renderPantry() {
  const items = state.pantry
    .filter((i) => state.pantryCat === 'all' || i.category === state.pantryCat)
    .filter((i) => state.pantryItemCat === 'all' || (i.item_category || 'その他') === state.pantryItemCat)
    .sort(PANTRY_SORTS[state.pantrySort] || PANTRY_SORTS.expiry);
  $('#pantry-list').innerHTML = items.length
    ? items.map((i) => `
      <div class="pantry-item" data-id="${i.id}">
        <span class="name" data-act="edit">${esc(i.name)}
          <span class="chip" style="background:#eef2f7;color:var(--text-sub)">${esc(i.item_category || 'その他')}</span>
          <span class="chip" style="background:#e6f2ee;color:var(--brand)">${esc(i.category)}</span><br>
          ${expChip(i.expires_on)}
          ${i.note ? `<br><small style="color:var(--text-sub)">📝 ${esc(i.note)}</small>` : ''}
        </span>
        <button class="out-btn" data-act="out">切れた🛒</button>
        <button class="del-btn" data-act="del">✕</button>
      </div>`).join('')
    : '<div class="empty">該当する在庫はありません</div>';
}

$('#pantry-seg').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-cat]');
  if (!b) return;
  state.pantryCat = b.dataset.cat;
  $$('#pantry-seg button').forEach((x) => x.classList.toggle('active', x === b));
  renderPantry();
});

$('#pantry-add').addEventListener('click', async () => {
  const name = $('#pantry-name').value.trim();
  const date = $('#pantry-date').value;
  if (!name || !date) return toast('品名と賞味期限を入れてください');
  const { error } = await sb.from('pantry_items').insert({
    name, category: $('#pantry-cat').value, item_category: $('#pantry-itemcat').value, expires_on: date,
  });
  if (error) return dbErr(error, '追加に失敗しました');
  $('#pantry-name').value = '';
  await loadTable('pantry_items'); rerender();
});
$('#pantry-filter-itemcat').addEventListener('change', (e) => { state.pantryItemCat = e.target.value; renderPantry(); });
$('#pantry-sort').addEventListener('change', (e) => { state.pantrySort = e.target.value; renderPantry(); });
$('#pantry-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#pantry-add').click(); });

$('#pantry-list').addEventListener('click', async (e) => {
  const row = e.target.closest('.pantry-item');
  const act = e.target.closest('[data-act]');
  if (!row || !act) return;
  const item = state.pantry.find((i) => i.id === row.dataset.id);
  if (!item) return;

  if (act.dataset.act === 'edit') {
    return openPantryEditModal(item);
  } else if (act.dataset.act === 'out') {
    // 在庫切れ → 買い物リストへワンタップ追加（カテゴリ・備考・使用回数を覚えて循環させる）
    const { error: e1 } = await sb.from('shopping_items').insert({
      name: item.name, source: 'pantry', pantry_category: item.category,
      pantry_item_category: item.item_category || 'その他',
      pantry_note: item.note || null, pantry_use_count: item.use_count || 1,
    });
    if (e1) return dbErr(e1, '買い物リストへの追加に失敗しました');

/* ============================================================
 * 車予約（優先度4） 週タイムライン 6:00-24:00
 * ============================================================ */
const CAR_START_H = 6, CAR_END_H = 24, HOUR_PX = 40;

function renderCar() {
  const ws = state.carWeekStart;
  const we = addDays(ws, 6);
  $('#car-week-label').textContent =
    `${ws.getMonth() + 1}/${ws.getDate()}（${WDAYS[ws.getDay()]}）〜 ${we.getMonth() + 1}/${we.getDate()}（${WDAYS[we.getDay()]}）`;
  $('#car-legend').innerHTML = CONFIG.MEMBERS.map((m) =>
    `<span class="lg"><span class="dot" style="background:${m.color}"></span>${esc(m.name)}</span>`).join('');

  const days = [...Array(7)].map((_, i) => addDays(ws, i));
  $('#tl-header').innerHTML = '<div></div>' + days.map((d) => `
    <div class="day-h ${dstr(d) === todayStr() ? 'today-h' : ''}">
      ${WDAYS[d.getDay()]}<span class="d-num">${d.getDate()}</span>
    </div>`).join('');

  const totalH = (CAR_END_H - CAR_START_H) * HOUR_PX;
  const hourLabels = [...Array(CAR_END_H - CAR_START_H + 1)].map((_, i) =>
    `<span class="h-label" style="top:${i * HOUR_PX}px">${CAR_START_H + i}</span>`).join('');

  const dayCols = days.map((d) => {
    const ds = dstr(d);
    const lines = [...Array(CAR_END_H - CAR_START_H)].map((_, i) =>
      `<div class="h-line" style="top:${i * HOUR_PX}px"></div>`).join('');
    const blocks = state.cars
      .filter((r) => dstr(new Date(r.starts_at)) === ds)
      .map((r) => {
        const s = new Date(r.starts_at), e = new Date(r.ends_at);
        const sMin = Math.max(s.getHours() * 60 + s.getMinutes(), CAR_START_H * 60);
        let eMin = e.getHours() * 60 + e.getMinutes();
        if (eMin === 0) eMin = 24 * 60;
        eMin = Math.min(eMin, CAR_END_H * 60);
        const top = ((sMin - CAR_START_H * 60) / 60) * HOUR_PX;
        const h = Math.max(((eMin - sMin) / 60) * HOUR_PX, 14);
        return `<div class="tl-block" data-id="${r.id}" style="top:${top}px;height:${h}px;background:${memberColor(r.member)}">${esc(r.member)}</div>`;
      }).join('');
    return `<div class="tl-day" data-date="${ds}" style="height:${totalH}px">${lines}${blocks}</div>`;
  }).join('');

  $('#tl-body').innerHTML = `<div class="tl-hours" style="height:${totalH}px">${hourLabels}</div>${dayCols}`;
}

$('#car-prev').addEventListener('click', () => { state.carWeekStart = addDays(state.carWeekStart, -7); renderCar(); });
$('#car-next').addEventListener('click', () => { state.carWeekStart = addDays(state.carWeekStart, 7); renderCar(); });
$('#car-today').addEventListener('click', () => { state.carWeekStart = mondayOf(new Date()); renderCar(); });
$('#car-add-btn').addEventListener('click', () => openCarModal(todayStr(), CAR_START_H + 12));

$('#tl-body').addEventListener('click', (e) => {
  const block = e.target.closest('.tl-block');
  if (block) return openCarDetail(block.dataset.id);
  const col = e.target.closest('.tl-day');
  if (!col) return;
  const y = e.clientY - col.getBoundingClientRect().top;
  const hour = Math.min(CAR_START_H + Math.floor(y / HOUR_PX), CAR_END_H - 1);
  openCarModal(col.dataset.date, hour);
});

function timeOptions(selMin) {
  let html = '';
  for (let m = CAR_START_H * 60; m <= CAR_END_H * 60; m += 30) {
    const hh = String(Math.floor(m / 60)).padStart(2, '0');
    const mm = String(m % 60).padStart(2, '0');
    html += `<option value="${m}" ${m === selMin ? 'selected' : ''}>${hh}:${mm}</option>`;
  }
  return html;
}

function carOverlapExists(dateStr, sMin, eMin, excludeId = null) {
  return state.cars.some((r) => {
    if (r.id === excludeId) return false;
    if (dstr(new Date(r.starts_at)) !== dateStr) return false;
    const rs = new Date(r.starts_at), re = new Date(r.ends_at);
    const rsMin = rs.getHours() * 60 + rs.getMinutes();
    let reMin = re.getHours() * 60 + re.getMinutes();
    if (reMin === 0) reMin = 24 * 60;
    return sMin < reMin && eMin > rsMin;
  });
}

function openCarModal(dateStr, startHour) {
  openModal(`
    <h2>🚗 車を予約</h2>
    <div class="form-grid">
      <select id="cr-member">${CONFIG.MEMBERS.map((m) => `<option>${esc(m.name)}</option>`).join('')}</select>
      <input type="date" id="cr-date" value="${dateStr}">
      <div class="form-2col">
        <select id="cr-start">${timeOptions(startHour * 60)}</select>
        <select id="cr-end">${timeOptions(Math.min((startHour + 1) * 60, CAR_END_H * 60))}</select>
      </div>
      <input type="text" id="cr-note" placeholder="メモ（例：買い出し）">
      <div id="cr-warn" style="color:var(--danger);font-size:.82rem;min-height:1.2em"></div>
      <button class="btn-primary" id="cr-ok">予約する</button>
    </div>`);

  const check = () => {
    const s = parseInt($('#cr-start').value, 10);
    const en = parseInt($('#cr-end').value, 10);
    const d = $('#cr-date').value;
    let msg = '';
    if (en <= s) msg = '終了時刻は開始より後にしてください';
    else if (carOverlapExists(d, s, en)) msg = '⚠️ この時間帯はすでに予約があります';
    $('#cr-warn').textContent = msg;
    $('#cr-ok').disabled = !!msg;  // UI側の一段目ブロック
  };
  ['cr-start', 'cr-end', 'cr-date'].forEach((id) => $('#' + id).addEventListener('change', check));
  check();

  $('#cr-ok').addEventListener('click', async () => {
    const d = $('#cr-date').value;
    const sMin = parseInt($('#cr-start').value, 10);
    const eMin = parseInt($('#cr-end').value, 10);
    const base = new Date(d + 'T00:00:00');
    const starts = new Date(base.getTime() + sMin * 60000);
    const ends = new Date(base.getTime() + eMin * 60000);
    const { error } = await sb.from('car_reservations').insert({
      member: $('#cr-member').value, starts_at: starts.toISOString(), ends_at: ends.toISOString(),
      note: $('#cr-note').value.trim() || null,
    });
    closeModal();
    if (error) {
      // DB側の二段目ブロック（排他制約違反 = 23P01）
      if (error.code === '23P01') return showErr('他の予約と時間が重なっています（他の端末から先に予約された可能性）');
      return dbErr(error, '予約に失敗しました');
    }
    await loadTable('car_reservations'); rerender();
    toast('予約しました 🚗');
  });
}

/* ============================================================
 * カレンダー（優先度5）
 * ============================================================ */
function renderCalendar() {
  const c = state.calCursor;
  $('#cal-label').textContent = `${c.getFullYear()}年${c.getMonth() + 1}月`;
  // 凡例（固定表示・「みんな」含む）
  $('#cal-legend').innerHTML = [...CONFIG.MEMBERS, MINNA].map((m) =>
    `<span class="lg"><span class="dot" style="background:${m.color}"></span>${esc(m.name)}</span>`).join('');

  const first = new Date(c.getFullYear(), c.getMonth(), 1);
  const gridStart = addDays(first, -first.getDay()); // 日曜はじまり
  let html = WDAYS.map((w, i) =>
    `<div class="cal-wd ${i === 0 ? 'sun' : ''} ${i === 6 ? 'sat' : ''}">${w}</div>`).join('');
  for (let i = 0; i < 42; i++) {
    const d = addDays(gridStart, i);
    const ds = dstr(d);
    const inMonth = d.getMonth() === c.getMonth();
    const dots = state.events.filter((e) => eventCovers(e, ds))
      .flatMap((e) => evMembers(e)).slice(0, 4)
      .map((n) => `<span class="dot" style="background:${memberColor(n)}"></span>`).join('');
    html += `
      <div class="cal-cell ${inMonth ? '' : 'dim'} ${ds === todayStr() ? 'today' : ''} ${ds === state.calSelected ? 'selected' : ''}" data-date="${ds}">
        <span class="d ${d.getDay() === 0 ? 'sun' : ''} ${d.getDay() === 6 ? 'sat' : ''}">${d.getDate()}</span>
        <div class="cal-dots">${dots}</div>
      </div>`;
  }
  $('#cal-grid').innerHTML = html;
  renderCalDayList();
}

function renderCalDayList() {
  const ds = state.calSelected;
  const d = new Date(ds + 'T00:00:00');
  $('#cal-sel-label').textContent = `${d.getMonth() + 1}月${d.getDate()}日（${WDAYS[d.getDay()]}）の予定`;
  const evs = state.events.filter((e) => eventCovers(e, ds));
  $('#cal-day-list').innerHTML = evs.length
    ? evs.map((e) => `
      <div class="day-event" data-id="${e.id}">
        <span style="display:flex;gap:2px;flex-shrink:0">${memberDots(evMembers(e))}</span>
        <span class="t-time">${evTimeLabel(e, ds)}</span>
        <span class="title">${esc(e.title)}
          <span class="mem-names">${evMembers(e).map(esc).join('・')}</span>
          ${evPeriodNote(e)} ${mealNote(e)}
          ${e.note ? `<br><small style="color:var(--text-sub)">${esc(e.note)}</small>` : ''}</span>
        <span style="color:#cbd5e1">›</span>
      </div>`).join('')
    : '<div class="empty">予定はありません</div>';
}

function openEventModal(id) {
  const ev = id ? state.events.find((x) => x.id === id) : null;
  openModal(`
    <h2>📅 ${ev ? '予定を編集' : '予定を追加'}</h2>
    <div class="form-grid">
      <input type="text" id="ev-title" placeholder="予定名" value="${ev ? esc(ev.title) : ''}">
      <div><span class="f-label">だれの予定？（複数選択可）</span>
        <div class="chip-row" id="ev-members">
          ${[...CONFIG.MEMBERS, MINNA].map((m) => `<button type="button" class="sel-chip" data-name="${esc(m.name)}" data-color="${m.color}">${esc(m.name)}</button>`).join('')}
        </div>
      </div>
      <div class="form-2col">
        <div><span class="f-label">開始日</span><input type="date" id="ev-date" value="${ev ? ev.event_date : state.calSelected}"></div>
        <div><span class="f-label">開始時刻（任意）</span><input type="time" id="ev-time" value="${ev && ev.start_time ? ev.start_time.slice(0, 5) : ''}"></div>
      </div>
      <div class="form-2col">
        <div><span class="f-label">終了日（任意）</span><input type="date" id="ev-end-date" value="${ev && ev.end_date ? ev.end_date : ''}"></div>
        <div><span class="f-label">終了時刻（任意）</span><input type="time" id="ev-end-time" value="${ev && ev.end_time ? ev.end_time.slice(0, 5) : ''}"></div>
      </div>
      <div><span class="f-label">食事不要（いらない食事をタップ）</span>
        <div class="chip-row" id="ev-meals">
          ${MEALS.map((m) => `<button type="button" class="sel-chip" data-meal="${m}">🍽️${m}</button>`).join('')}
        </div>
      </div>
      <input type="text" id="ev-note" placeholder="メモ（任意）" value="${ev && ev.note ? esc(ev.note) : ''}">
      <button class="btn-primary" id="ev-ok">${ev ? '保存する' : '追加する'}</button>
      ${ev ? '<button class="btn-danger-ghost" id="ev-del">この予定を削除する</button>' : ''}
      <button class="btn-close" id="ev-close">閉じる</button>
    </div>`);

  // メンバーチップ: 複数選択可。「みんな」は単独選択（他と同時に選べない）
  const setChip = (b, on) => {
    b.classList.toggle('on', on);
    b.style.background = on ? b.dataset.color : '';
    b.style.color = '';
  };
  const initMembers = ev ? evMembers(ev) : [];
  $$('#ev-members .sel-chip').forEach((b) => {
    setChip(b, initMembers.includes(b.dataset.name));
    b.addEventListener('click', () => {
      const isMinna = b.dataset.name === MINNA.name;
      const turnOn = !b.classList.contains('on');
      if (turnOn) {
        if (isMinna) $$('#ev-members .sel-chip').forEach((x) => setChip(x, false));       // みんな→他を全解除
        else setChip($('#ev-members .sel-chip[data-name="みんな"]'), false);              // 個人→みんなを解除
      }
      setChip(b, turnOn);
    });
  });
  // 食事不要チップ
  const initMeals = (ev && ev.skip_meals) || [];
  $$('#ev-meals .sel-chip').forEach((b) => {
    const set = (on) => { b.classList.toggle('on', on); b.style.background = on ? 'var(--warn)' : ''; };
    set(initMeals.includes(b.dataset.meal));
    b.addEventListener('click', () => set(!b.classList.contains('on')));
  });
  $('#ev-close').addEventListener('click', closeModal);

  $('#ev-ok').addEventListener('click', async () => {
    const title = $('#ev-title').value.trim();
    const date = $('#ev-date').value;
    if (!title || !date) return toast('予定名と開始日を入れてください');
    const endDateRaw = $('#ev-end-date').value;
    const startTime = $('#ev-time').value;
    const endTime = $('#ev-end-time').value;
    if (endDateRaw && endDateRaw < date) return toast('終了日は開始日以降にしてください');
    const sameDay = !endDateRaw || endDateRaw === date;
    if (sameDay && startTime && endTime && endTime <= startTime) return toast('終了時刻は開始時刻より後にしてください');
    const members = [...$$('#ev-members .sel-chip.on')].map((b) => b.dataset.name);
    if (!members.length) return toast('だれの予定か選んでください');
    const meals = [...$$('#ev-meals .sel-chip.on')].map((b) => b.dataset.meal);
    const payload = {
      title, members, member: members[0], event_date: date,
      end_date: sameDay ? null : endDateRaw,
      start_time: startTime || null, end_time: endTime || null,
      skip_meals: meals.length ? meals : null,
      note: $('#ev-note').value.trim() || null,
    };
    const q = ev ? sb.from('events').update(payload).eq('id', ev.id) : sb.from('events').insert(payload);
    const { error } = await q;
    closeModal();
    if (error) return dbErr(error, '保存に失敗しました');
    state.calSelected = date;
    await loadTable('events'); rerender();
  });
  if (ev) $('#ev-del').addEventListener('click', async () => {
    if (!confirm(`「${ev.title}」を削除しますか？`)) return;
    const { error } = await sb.from('events').delete().eq('id', ev.id);
    closeModal();
    if (error) return dbErr(error, '削除に失敗しました');
    await loadTable('events'); rerender();
  });
}

/* ============================================================
 * 起動
 * ============================================================ */
async function startApp() {
  $('#view-login').classList.remove('active');
  $('#bottom-nav').classList.add('show');
  sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  // 更新月・品目カテゴリのセレクトを生成
  $('#sub-month').innerHTML = '<option value="">更新月（任意）</option>' +
    [...Array(12)].map((_, i) => `<option value="${i + 1}">${i + 1}月</option>`).join('');
  $('#pantry-date').value = dstr(addDays(new Date(), 7));
  $('#pantry-itemcat').innerHTML = ITEM_CATS.map((c) => `<option ${c === 'その他' ? 'selected' : ''}>${c}</option>`).join('');
  $('#pantry-filter-itemcat').innerHTML = '<option value="all">品目：すべて</option>' +
    ITEM_CATS.map((c) => `<option value="${c}">${c}</option>`).join('');

  try {
    await loadAll();
  } catch (e) {
    console.error(e);
    showErr('データの読み込みに失敗しました。setup.sql を実行済みか確認してください。');
  }
  subscribeRealtime();
  showView('home');
}

(function boot() {
  if (localStorage.getItem('gp_auth') === CONFIG.PASS_HASH) {
    startApp();
  } else {
    $('#view-login').classList.add('active');
  }
})();
</script>
